<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - PequeMundo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #3bc9c0;
      --teal-dark: #2aada4;
      --orange: #f97316;
      --orange-light: #fb923c;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --white: #ffffff;
      --red: #ef4444;
      --radius: 14px;
      --shadow: 0 10px 25px rgba(0,0,0,.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg, #f9fafb 0%, #e5e7eb 100%);
      color: var(--gray-900); 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, var(--teal) 0%, #22c55e 100%);
      padding: 32px 24px;
      text-align: center;
      color: var(--white);
    }

    .login-header h1 {
      font-family: 'Nunito', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .login-header p {
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0.95;
    }

    .login-body {
      padding: 32px 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 15px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--gray-700);
      font-size: 0.9rem;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: var(--gray-50);
      color: var(--gray-900);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--teal);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(59, 201, 192, 0.15);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-submit:hover {
      background: var(--orange-light);
      transform: translateY(-2px);
    }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--gray-500);
    }

    .login-footer a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .login-footer a:hover {
      color: var(--teal-dark);
      text-decoration: underline;
    }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--gray-400);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
      font-weight: 500;
    }

    .back-home:hover {
      color: var(--gray-700);
    }

    .messages {
      margin-bottom: 20px;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message.error {
      background: #fef2f2;
      color: var(--red);
      border-left: 4px solid var(--red);
    }

    .message.success {
      background: #f0fdf4;
      color: #16a34a;
      border-left: 4px solid #16a34a;
    }

    @media (max-width: 480px) {
      .form-row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>🏪 PequeMundo</h1>
      <p>¡Crea tu cuenta y únete a nosotros!</p>
    </div>
    
    <div class="login-body">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
              {% if message.tags == 'error' %}⚠️{% else %}✅{% endif %}
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label for="nombre">Nombre de Usuario *</label>
          <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej. ysilv" required autofocus>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido" class="form-control" placeholder="Opcional">
          </div>
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Opcional">
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">Contraseña *</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        
        <div class="form-group">
          <label for="password_confirm">Confirmar Contraseña *</label>
          <input type="password" id="password_confirm" name="password_confirm" class="form-control" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn-submit">
          Registrarme 🚀
        </button>
      </form>
      
      <div class="login-footer">
        ¿Ya tienes una cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
      </div>
      
      <a href="{% url 'catalogo' %}" class="back-home">⬅️ Volver al Catálogo</a>
    </div>
  </div>

</body>
</html>
