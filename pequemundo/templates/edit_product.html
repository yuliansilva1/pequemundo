{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar producto - PequiMundo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">


<link rel="stylesheet" href="{% static 'css/edit_product.css' %}">
</head>
<body>
<div class="container">
  <h1>Editar producto</h1>
  <p>Modifica los datos del producto y guarda los cambios.</p>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
      <p class="{{ message.tags }}">{{ message }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" value="{{ producto.nombre }}" required>
    </div>
    <div class="form-group">
      <label for="precio">Precio</label>
      <input type="text" id="precio" name="precio" value="{{ producto.precio }}" required>
    </div>
    <div class="form-group">
      <label for="stock">Stock</label>
      <input type="number" id="stock" name="stock" value="{{ producto.stock }}" min="0" required>
    </div>
    <div class="form-group">
      <label for="imagen_file">Imagen del producto</label>
      <input type="file" id="imagen_file" name="imagen_file" accept="image/*">
    </div>
    <div class="form-group">
      <label for="imagen_url">URL de imagen</label>
      <input type="url" id="imagen_url" name="imagen_url" value="{{ producto.imagen_url|default_if_none:'' }}" placeholder="https://...">
    </div>
    <div class="form-group">
      <label for="categoria">Categoría</label>
      <select id="categoria" name="categoria" required>
        {% for categoria in categorias %}
          <option value="{{ categoria.id_categoria }}" {% if categoria.id_categoria == producto.id_categoria.id_categoria %}selected{% endif %}>{{ categoria.nombre }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label for="activo">Estado</label>
      <select id="activo" name="activo">
        <option value="1" {% if producto.activo == '1' %}selected{% endif %}>Activo</option>
        <option value="0" {% if producto.activo == '0' %}selected{% endif %}>Inactivo</option>
      </select>
    </div>
    <div class="form-group">
      <label for="descripcion">Descripción</label>
      <input type="text" id="descripcion" name="descripcion" value="{{ producto.descripcion|default_if_none:'' }}">
    </div>
    <div class="form-group">
      <label for="marca">Marca</label>
      <input type="text" id="marca" name="marca" value="{{ producto.marca|default_if_none:'' }}" placeholder="Ej: PequeMundo">
    </div>
    <div class="form-group">
      <label for="medidas">Medidas</label>
      <input type="text" id="medidas" name="medidas" value="{{ producto.medidas|default_if_none:'' }}" placeholder="Ej: 120x60x80 cm">
    </div>
    <div class="form-group">
      <label for="material">Material</label>
      <input type="text" id="material" name="material" value="{{ producto.material|default_if_none:'' }}" placeholder="Ej: Madera">
    </div>
    <button class="btn-save" type="submit">Guardar cambios</button>
  </form>

  <a href="{% url 'catalogo' %}" class="back-link">← Volver al catálogo</a>
</div>
</body>
</html>
