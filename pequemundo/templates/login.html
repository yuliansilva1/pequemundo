<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PequiMundo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #3bc9c0;
    --teal-dark: #2aada4;
    --orange: #f97316;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --white: #ffffff;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .login-container {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 40px; width: 100%; max-width: 400px; text-align: center;
  }
  .login-container h1 { font-family: 'Nunito', sans-serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
  .login-container p { color: var(--gray-500); margin-bottom: 24px; }

  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-weight: 600; margin-bottom: 4px; }
  .form-group input {
    width: 100%; padding: 12px; border: 1px solid var(--gray-200); border-radius: 8px;
    font-size: 1rem; font-family: 'Poppins', sans-serif;
  }
  .form-group input:focus { outline: none; border-color: var(--teal); }

  .btn-login {
    width: 100%; padding: 12px; background: var(--teal); color: var(--white);
    border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .btn-login:hover { background: var(--teal-dark); }

  .back-link { display: inline-block; margin-top: 16px; color: var(--teal); text-decoration: none; font-weight: 600; }
  .back-link:hover { color: var(--teal-dark); }

  .messages { margin-bottom: 16px; }
  .messages .error { color: #d92424; font-weight: 600; }
</style>
</head>
<body>

<div class="login-container">
  <h1>Iniciar Sesión</h1>
  <p>Accede a tu cuenta en PequeMundo</p>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
    <p class="{% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" required>
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn-login">Iniciar Sesión</button>
  </form>

  <a href="{% url 'register' %}" class="back-link">Crear una cuenta nueva</a>
  <br>
  <a href="{% url 'catalogo' %}" class="back-link">← Volver al catálogo</a>
</div>

</body>
</html>
