<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirigiendo a Webpay</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f7fb;color:#111;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
    .container{background:#fff;padding:28px 30px;border-radius:18px;box-shadow:0 16px 40px rgba(0,0,0,.08);max-width:420px;text-align:center;}
    h1{margin-bottom:18px;font-size:1.4rem;}
    p{margin-bottom:20px;color:#555;}
    .button{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:999px;background:#0b8cff;color:#fff;font-weight:700;text-decoration:none;border:none;cursor:pointer;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Redirigiendo a Webpay...</h1>
    <p>Tu pago se procesará en la pasarela segura de Webpay. Si no se redirige automáticamente, haz clic en el botón.</p>
    <form id="webpayForm" action="{{ webpay_url }}" method="POST">
      <input type="hidden" name="token_ws" value="{{ webpay_token }}">
      <button class="button" type="submit">Continuar a Webpay</button>
    </form>
    <noscript>
      <p style="margin-top:18px;color:#7f1d1d;">Tu navegador necesita JavaScript para completar la redirección automática. Pulsa el botón si no se redirige automáticamente.</p>
    </noscript>
  </div>
  <script>
    window.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('webpayForm');
      if (form) {
        form.submit();
      }
    });
  </script>
</body>
</html>
