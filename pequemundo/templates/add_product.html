<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agregar producto - PequeMundo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #3bc9c0;
    --teal-dark: #2aada4;
    --orange: #f97316;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --white: #ffffff;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 36px; width: 100%; max-width: 540px; }
  h1 { font-family: 'Nunito', sans-serif; font-size: 1.8rem; margin-bottom: 12px; }
  p { color: var(--gray-600); margin-bottom: 22px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-weight: 700; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--gray-200); font-size: 1rem; font-family: 'Poppins', sans-serif; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--teal); }
  .form-group textarea { resize: vertical; min-height: 100px; }
  .btn-save { width: 100%; padding: 14px; background: var(--teal); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
  .btn-save:hover { background: var(--teal-dark); }
  .messages { margin-bottom: 18px; }
  .messages p { padding: 12px 14px; border-radius: 10px; }
  .messages .error { background: #fee2e2; color: #b91c1c; }
  .messages .success { background: #dcfce7; color: #166534; }
  .back-link { display:block; margin-top: 18px; color: var(--teal); text-decoration: none; font-weight: 700; }
</style>
</head>
<body>
<div class="container">
  <h1>Agregar nuevo producto</h1>
  <p>Completa los datos del producto para agregarlo al catálogo.</p>

  {% if messages %}
  <div class="messages">
    {% for message in messages %}
      <p class="{{ message.tags }}">{{ message }}</p>
    {% endfor %}
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="nombre">Nombre *</label>
      <input type="text" id="nombre" name="nombre" required>
    </div>
    <div class="form-group">
      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" name="descripcion" placeholder="Describe el producto..."></textarea>
    </div>
    <div class="form-group">
      <label for="precio">Precio *</label>
      <input type="number" id="precio" name="precio" step="0.01" min="0" required>
    </div>
    <div class="form-group">
      <label for="stock">Stock *</label>
      <input type="number" id="stock" name="stock" value="0" min="0" required>
    </div>
    <div class="form-group">
      <label for="imagen_url">URL de imagen</label>
      <input type="url" id="imagen_url" name="imagen_url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label for="categoria">Categoría *</label>
      <select id="categoria" name="categoria" required>
        <option value="">-- Selecciona una categoría --</option>
        {% for categoria in categorias %}
          <option value="{{ categoria.id_categoria }}">{{ categoria.nombre }}</option>
        {% endfor %}
      </select>
    </div>
    <button class="btn-save" type="submit">Agregar producto</button>
  </form>

  <a href="{% url 'catalogo' %}" class="back-link">← Volver al catálogo</a>
</div>
</body>
</html>
